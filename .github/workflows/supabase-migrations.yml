name: Deploy Supabase migrations and edge functions

# Applies supabase/migrations/*.sql and deploys supabase/functions/* to the
# live project whenever a merge to main changes either folder. This exists
# because migration 0003 sat in the repo for a full session without ever
# being applied to production — there was no automation catching that, only
# a symptom (a schema-switch bug) far downstream. `supabase db push` is
# idempotent: it only applies migrations not yet recorded in the remote
# history table, so re-runs are always safe. `supabase functions deploy`
# is likewise safe to re-run — same reasoning extended to the food-proxy
# edge function (see PROJECT.md): its code living in the repo is worthless
# if nothing ever ships it to Supabase, so that step is automated too
# instead of depending on someone remembering to run the CLI by hand.
on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/functions/**"
  workflow_dispatch: {}

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Push migrations
        run: supabase db push --password "$SUPABASE_DB_PASSWORD"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Deploy edge functions
        run: supabase functions deploy food-proxy --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
